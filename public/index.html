<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мессенджер - Приватные чаты</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loginScreen" class="screen">
        <div class="auth-container">
            <h1>💬 Мессенджер</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
            <form id="registerForm" style="display:none">
                <input type="text" id="regUsername" placeholder="Имя пользователя" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div id="chatScreen" class="screen" style="display:none">
        <div class="app-container">
            <div class="sidebar">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div class="user-details">
                        <span id="currentUsername"></span>
                        <small id="onlineStatus"></small>
                    </div>
                    <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                
                <!-- Кнопки для создания чатов -->
                <div class="create-buttons">
                    <button id="createGroupBtn" class="create-btn"><i class="fas fa-users"></i> Создать группу</button>
                    <button id="createDirectBtn" class="create-btn"><i class="fas fa-user-plus"></i> Новый чат</button>
                </div>
                
                <!-- Список комнат -->
                <div class="rooms-section">
                    <h3><i class="fas fa-comments"></i> Чаты</h3>
                    <div id="roomsList" class="rooms-list"></div>
                </div>
                
                <!-- Список друзей -->
                <div class="friends-section">
                    <h3><i class="fas fa-user-friends"></i> Друзья</h3>
                    <div id="friendsList" class="friends-list"></div>
                </div>
            </div>
            
            <div class="chat-main">
                <div class="chat-header">
                    <h2 id="currentRoomName">Общий чат</h2>
                    <div class="chat-actions">
                        <button id="emojiBtn" class="icon-btn"><i class="fas fa-smile"></i></button>
                        <button id="fileBtn" class="icon-btn"><i class="fas fa-paperclip"></i></button>
                        <button id="infoBtn" class="icon-btn"><i class="fas fa-info-circle"></i></button>
                    </div>
                </div>
                
                <div class="messages-area" id="messagesArea">
                    <div class="messages" id="messages"></div>
                </div>
                
                <div class="typing-indicator" id="typingIndicator"></div>
                
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="notificationSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <div id="emojiPicker" class="emoji-picker" style="display:none"></div>
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,application/pdf">
    
    <!-- Модальные окна -->
    <div id="createGroupModal" class="modal" style="display:none">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Создать групповой чат</h3>
            <input type="text" id="groupName" placeholder="Название группы">
            <h4>Выберите участников из друзей:</h4>
            <div id="friendsSelect" class="friends-select"></div>
            <button id="createGroupSubmit">Создать</button>
        </div>
    </div>
    
    <div id="createDirectModal" class="modal" style="display:none">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Новый личный чат</h3>
            <input type="text" id="searchUser" placeholder="Поиск по имени пользователя">
            <div id="searchResults" class="search-results"></div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
