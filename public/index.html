<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a6fa5">
    <title>Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Экран входа */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-y: auto;
            padding: 1rem;
        }

        .auth-container {
            background: white;
            padding: 2rem 1.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-container h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #4a6fa5;
            font-size: 1.8rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            border-radius: 14px;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 500;
        }

        .tab-btn.active {
            background: #4a6fa5;
            color: white;
        }

        .auth-container input {
            width: 100%;
            padding: 0.875rem;
            margin-bottom: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .auth-container input:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        .auth-container button[type="submit"] {
            width: 100%;
            padding: 0.875rem;
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .auth-container button[type="submit"]:active {
            background: #3a5a8c;
            transform: scale(0.98);
        }

        .error-message {
            color: #f44336;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        /* Основной чат - мобильная версия */
        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
            background: #f5f5f5;
            position: relative;
        }

        /* Боковая панель - выезжающее меню на телефоне */
        .sidebar {
            position: fixed;
            left: -85%;
            top: 0;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background: white;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.open {
            left: 0;
        }

        /* Затемнение фона при открытом меню */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            display: block;
        }

        .user-info {
            padding: 1.25rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .user-details {
            flex: 1;
        }

        .user-details span {
            font-weight: bold;
            display: block;
            font-size: 1.1rem;
        }

        .user-details small {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            color: #666;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
        }

        .icon-btn:active {
            background: rgba(0,0,0,0.05);
            transform: scale(0.95);
        }

        .create-buttons {
            padding: 1rem;
            display: flex;
            gap: 0.75rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .create-btn {
            flex: 1;
            padding: 0.625rem;
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .create-btn:active {
            transform: scale(0.97);
            background: #3a5a8c;
        }

        .rooms-section, .requests-section, .friends-section {
            padding: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }

        .rooms-section h3, .requests-section h3, .friends-section h3 {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rooms-list, .friends-list, .friend-requests-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .room-item, .friend-item {
            padding: 0.75rem;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .room-item:active, .friend-item:active {
            transform: scale(0.98);
            background: #e0e0e0;
        }

        .room-item.active {
            background: #4a6fa5;
            color: white;
        }

        .room-type {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .friend-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .friend-status.online {
            background: #4caf50;
            box-shadow: 0 0 4px #4caf50;
        }

        .friend-status.offline {
            background: #9e9e9e;
        }

        .request-item {
            padding: 0.75rem;
            background: #fff3e0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .request-item button {
            padding: 0.375rem 0.75rem;
            margin-left: 0.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .request-item .accept-btn {
            background: #4caf50;
            color: white;
        }

        .request-item .reject-btn {
            background: #f44336;
            color: white;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            width: 100%;
        }

        .chat-header {
            padding: 0.875rem 1rem;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .menu-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 12px;
        }

        .menu-toggle:active {
            background: rgba(0,0,0,0.05);
        }

        .chat-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            text-align: center;
            margin: 0 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-actions {
            display: flex;
            gap: 0.25rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .message {
            max-width: 85%;
            padding: 0.625rem 0.875rem;
            border-radius: 18px;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            background: #4a6fa5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message-header {
            font-size: 0.65rem;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        .message-content {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .typing-indicator {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: #888;
            font-style: italic;
            min-height: 36px;
            background: #f5f5f5;
        }

        .input-area {
            display: flex;
            padding: 0.75rem;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 0.5rem;
            align-items: center;
            position: sticky;
            bottom: 0;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            background: #f5f5f5;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #4a6fa5;
            background: white;
        }

        .input-area button {
            padding: 0.75rem 1.25rem;
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .input-area button:active {
            transform: scale(0.95);
            background: #3a5a8c;
        }

        .emoji-picker {
            position: fixed;
            bottom: 80px;
            right: 10px;
            left: 10px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 0.75rem;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0.5rem;
            max-width: 320px;
            margin: 0 auto;
            z-index: 1001;
            animation: slideUp 0.2s ease;
        }

        .emoji-picker span {
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.25rem;
            text-align: center;
            transition: transform 0.1s;
        }

        .emoji-picker span:active {
            transform: scale(1.2);
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.2s ease;
        }

        .modal-content h3, .modal-content h4 {
            margin-bottom: 1rem;
        }

        .modal-content input {
            width: 100%;
            padding: 0.875rem;
            margin-bottom: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 14px;
            font-size: 1rem;
        }

        .close {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
            margin-top: -0.5rem;
            margin-right: -0.5rem;
            padding: 0.5rem;
        }

        .friends-select {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }

        .friend-checkbox {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .friend-checkbox:active {
            background: #f0f0f0;
        }

        .friend-checkbox input {
            width: auto;
            margin-right: 0.75rem;
            margin-bottom: 0;
            transform: scale(1.2);
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 0.75rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .search-result-item:active {
            background: #f0f0f0;
        }

        .search-result-item button {
            padding: 0.375rem 0.875rem;
            background: #4a6fa5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Десктопная версия */
        @media (min-width: 768px) {
            .menu-toggle {
                display: none;
            }
            
            .sidebar {
                position: relative;
                left: 0 !important;
                width: 300px;
                max-width: 300px;
                box-shadow: none;
                border-right: 1px solid #e0e0e0;
            }
            
            .sidebar-overlay {
                display: none !important;
            }
            
            .chat-header h2 {
                text-align: left;
                margin-left: 0;
            }
            
            .message {
                max-width: 60%;
            }
            
            .emoji-picker {
                right: 20px;
                left: auto;
                bottom: 80px;
            }
        }

        /* Для iPhone и Android с безопасной зоной */
        @supports (padding: max(0px)) {
            .chat-header:first-child {
                padding-top: max(0.875rem, env(safe-area-inset-top));
            }
            .input-area {
                padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div id="loginScreen" class="screen">
        <div class="auth-container">
            <h1>💬 Мессенджер</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Имя пользователя" required autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль" required>
                <button type="submit">Войти</button>
                <div id="loginError" class="error-message"></div>
            </form>
            <form id="registerForm" style="display:none">
                <input type="text" id="regUsername" placeholder="Имя пользователя" required autocomplete="off">
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <button type="submit">Зарегистрироваться</button>
                <div id="regError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Экран чата -->
    <div id="chatScreen" class="screen" style="display:none">
        <div class="app-container">
            <!-- Затемнение -->
            <div id="sidebarOverlay" class="sidebar-overlay"></div>
            
            <!-- Боковая панель -->
            <div id="sidebar" class="sidebar">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div class="user-details">
                        <span id="currentUsername"></span>
                        <small id="onlineStatus">🟢 Онлайн</small>
                    </div>
                    <button id="logoutBtn" class="icon-btn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                
                <div class="create-buttons">
                    <button id="createGroupBtn" class="create-btn"><i class="fas fa-users"></i> Группа</button>
                    <button id="createDirectBtn" class="create-btn"><i class="fas fa-user-plus"></i> Друг</button>
                </div>
                
                <div class="rooms-section">
                    <h3><i class="fas fa-comments"></i> Чаты</h3>
                    <div id="roomsList" class="rooms-list"></div>
                </div>
                
                <div class="requests-section">
                    <h3><i class="fas fa-user-plus"></i> Запросы</h3>
                    <div id="friendRequestsList" class="friend-requests-list"></div>
                </div>
                
                <div class="friends-section">
                    <h3><i class="fas fa-user-friends"></i> Друзья</h3>
                    <div id="friendsList" class="friends-list"></div>
                </div>
            </div>
            
            <!-- Основная область чата -->
            <div class="chat-main">
                <div class="chat-header">
                    <button id="menuToggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h2 id="currentRoomName">Общий чат</h2>
                    <div class="chat-actions">
                        <button id="emojiBtn" class="icon-btn" title="Смайлики"><i class="fas fa-smile"></i></button>
                        <button id="fileBtn" class="icon-btn" title="Файл"><i class="fas fa-paperclip"></i></button>
                    </div>
                </div>
                
                <div class="messages-area">
                    <div class="messages" id="messages"></div>
                </div>
                
                <div class="typing-indicator" id="typingIndicator"></div>
                
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Звук уведомления -->
    <audio id="notificationSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <!-- Панель смайликов -->
    <div id="emojiPicker" class="emoji-picker" style="display:none"></div>
    
    <!-- Выбор файла -->
    <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,application/pdf">
    
    <!-- Модальное окно создания группы -->
    <div id="createGroupModal" class="modal" style="display:none">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-users"></i> Создать группу</h3>
            <input type="text" id="groupName" placeholder="Название группы">
            <h4>Участники:</h4>
            <div id="friendsSelect" class="friends-select"></div>
            <button id="createGroupSubmit" class="create-btn">Создать</button>
        </div>
    </div>
    
    <!-- Модальное окно поиска пользователей -->
    <div id="createDirectModal" class="modal" style="display:none">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3><i class="fas fa-user-plus"></i> Добавить друга</h3>
            <input type="text" id="searchUser" placeholder="Поиск..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        let socket;
        let currentUser = null;
        let currentRoom = 1;
        let currentToken = null;
        let typingTimeout = null;
        let isTyping = false;

        const emojis = ['😀', '😂', '😍', '😎', '😢', '😡', '👍', '❤️', '🔥', '🎉', '✨', '💀', '🐱', '🍕', '⚽', '🎮', '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨'];

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentUsernameSpan = document.getElementById('currentUsername');
        const onlineStatusSpan = document.getElementById('onlineStatus');
        const roomsList = document.getElementById('roomsList');
        const friendsList = document.getElementById('friendsList');
        const friendRequestsList = document.getElementById('friendRequestsList');
        const typingIndicator = document.getElementById('typingIndicator');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const logoutBtn = document.getElementById('logoutBtn');
        const createGroupBtn = document.getElementById('createGroupBtn');
        const createDirectBtn = document.getElementById('createDirectBtn');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        let rooms = [];
        let friends = [];
        let friendRequests = [];

        // Мобильное меню
        function toggleMenu() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        }

        function closeMenu() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        if (menuToggle) {
            menuToggle.onclick = toggleMenu;
        }
        if (sidebarOverlay) {
            sidebarOverlay.onclick = closeMenu;
        }

        // Переключение табов
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
                document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
                document.getElementById('loginError').textContent = '';
                document.getElementById('regError').textContent = '';
            });
        });

        // Регистрация
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!username || !password) {
                document.getElementById('regError').textContent = 'Заполните все поля';
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    alert('✅ Регистрация успешна! Теперь войдите.');
                    document.querySelector('.tab-btn[data-tab="login"]').click();
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                } else {
                    document.getElementById('regError').textContent = data.error || 'Ошибка регистрации';
                }
            } catch(err) {
                document.getElementById('regError').textContent = '❌ Ошибка соединения';
            }
        });

        // Вход
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = 'Введите логин и пароль';
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    currentToken = data.token;
                    currentUser = { id: data.userId, username: data.username };
                    initChat();
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Неверный логин или пароль';
                }
            } catch(err) {
                document.getElementById('loginError').textContent = '❌ Ошибка соединения';
            }
        });

        async function initChat() {
            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            currentUsernameSpan.textContent = currentUser.username;
            
            await loadFriends();
            await loadFriendRequests();
            connectWebSocket();
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                socket.send(JSON.stringify({ type: 'auth', token: currentToken }));
                onlineStatusSpan.innerHTML = '🟢 Онлайн';
            };
            
            socket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleSocketMessage(data);
                } catch(e) {
                    console.error('Parse error:', e);
                }
            };
            
            socket.onerror = () => {
                onlineStatusSpan.innerHTML = '🔴 Ошибка';
            };
            
            socket.onclose = () => {
                onlineStatusSpan.innerHTML = '🔴 Офлайн';
                setTimeout(connectWebSocket, 3000);
            };
        }

        function handleSocketMessage(data) {
            switch(data.type) {
                case 'rooms_list':
                    rooms = data.rooms || [];
                    renderRooms();
                    break;
                case 'friends_list':
                    friends = data.friends || [];
                    renderFriends();
                    break;
                case 'friend_requests':
                    friendRequests = data.requests || [];
                    renderFriendRequests();
                    break;
                case 'friend_request':
                    addSystemMessage(`📨 ${data.from.username} хочет добавить вас в друзья!`);
                    loadFriendRequests();
                    playNotification();
                    if (navigator.vibrate) navigator.vibrate(200);
                    break;
                case 'friend_accepted':
                    addSystemMessage(`✅ ${data.by.username} принял(а) ваш запрос!`);
                    loadFriends();
                    loadFriendRequests();
                    playNotification();
                    break;
                case 'message':
                    addMessageToChat(data, data.username === currentUser.username);
                    if (data.username !== currentUser.username) {
                        playNotification();
                        if (navigator.vibrate) navigator.vibrate(100);
                    }
                    break;
                case 'file':
                    addFileToChat(data, data.username === currentUser.username);
                    break;
                case 'history':
                    messagesDiv.innerHTML = '';
                    if (data.messages && data.messages.length) {
                        data.messages.forEach(msg => {
                            addMessageToChat(msg, msg.username === currentUser.username, false);
                        });
                    }
                    break;
                case 'typing':
                    if (data.isTyping && data.username !== currentUser.username) {
                        typingIndicator.textContent = `${data.username} печатает...`;
                    } else if (!data.isTyping) {
                        typingIndicator.textContent = '';
                    }
                    break;
                case 'user_left':
                    addSystemMessage(`${data.username} покинул чат`);
                    break;
            }
        }

        async function loadFriends() {
            try {
                const res = await fetch('/api/friends', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (res.ok) {
                    friends = await res.json();
                    renderFriends();
                }
            } catch(e) {
                console.error('Error loading friends:', e);
            }
        }

        async function loadFriendRequests() {
            try {
                const res = await fetch('/api/friends/requests', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (res.ok) {
                    friendRequests = await res.json();
                    renderFriendRequests();
                }
            } catch(e) {
                console.error('Error loading requests:', e);
            }
        }

        async function loadRooms() {
            try {
                const res = await fetch('/api/rooms', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (res.ok) {
                    rooms = await res.json();
                    renderRooms();
                }
            } catch(e) {
                console.error('Error loading rooms:', e);
            }
        }

        function renderRooms() {
            roomsList.innerHTML = '';
            if (!rooms || rooms.length === 0) {
                roomsList.innerHTML = '<div style="padding: 0.5rem; color: #888;">Нет чатов</div>';
                return;
            }
            
            rooms.forEach(room => {
                const roomDiv = document.createElement('div');
                roomDiv.className = `room-item ${room.id === currentRoom ? 'active' : ''}`;
                let icon = room.type === 'public' ? 'fa-hashtag' : (room.type === 'direct' ? 'fa-user' : 'fa-users');
                let typeLabel = room.type === 'public' ? 'Общий' : (room.type === 'direct' ? 'Личный' : 'Группа');
                
                roomDiv.innerHTML = `
                    <div style="flex:1">
                        <i class="fas ${icon}"></i> ${escapeHtml(room.name)}
                        <div class="room-type">${typeLabel}</div>
                    </div>
                `;
                roomDiv.onclick = () => {
                    switchRoom(room.id, room.name, room.type);
                    closeMenu();
                };
                roomsList.appendChild(roomDiv);
            });
        }

        function renderFriends() {
            friendsList.innerHTML = '';
            if (!friends || friends.length === 0) {
                friendsList.innerHTML = '<div style="padding: 0.5rem; color: #888; text-align: center;">😔 Нет друзей</div>';
                return;
            }
            
            friends.forEach(friend => {
                const friendDiv = document.createElement('div');
                friendDiv.className = 'friend-item';
                friendDiv.innerHTML = `
                    <div style="flex:1; cursor: pointer;" class="friend-info" data-id="${friend.id}">
                        <span class="friend-status ${friend.online ? 'online' : 'offline'}"></span>
                        <strong>${escapeHtml(friend.username)}</strong>
                    </div>
                    <button class="icon-btn chat-with-friend" data-id="${friend.id}" title="Написать">
                        <i class="fas fa-comment"></i>
                    </button>
                `;
                friendDiv.querySelector('.friend-info').onclick = () => startDirectChat(friend.id);
                friendDiv.querySelector('.chat-with-friend').onclick = () => startDirectChat(friend.id);
                friendsList.appendChild(friendDiv);
            });
        }

        function renderFriendRequests() {
            if (!friendRequestsList) return;
            friendRequestsList.innerHTML = '';
            
            if (!friendRequests || friendRequests.length === 0) {
                friendRequestsList.innerHTML = '<div style="padding: 0.5rem; color: #888;">Нет запросов</div>';
                return;
            }
            
            friendRequests.forEach(req => {
                const div = document.createElement('div');
                div.className = 'request-item';
                div.innerHTML = `
                    <span>👤 ${escapeHtml(req.username)}</span>
                    <div>
                        <button class="accept-btn">✓</button>
                        <button class="reject-btn">✗</button>
                    </div>
                `;
                div.querySelector('.accept-btn').onclick = () => acceptFriendRequest(req.request_id);
                div.querySelector('.reject-btn').onclick = () => rejectFriendRequest(req.request_id);
                friendRequestsList.appendChild(div);
            });
        }

        async function acceptFriendRequest(requestId) {
            try {
                const res = await fetch('/api/friends/accept', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ requestId })
                });
                if (res.ok) {
                    alert('✅ Вы стали друзьями!');
                    await loadFriends();
                    await loadFriendRequests();
                }
            } catch(e) {
                alert('Ошибка');
            }
        }

        async function rejectFriendRequest(requestId) {
            try {
                const res = await fetch('/api/friends/reject', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ requestId })
                });
                if (res.ok) {
                    await loadFriendRequests();
                }
            } catch(e) {
                alert('Ошибка');
            }
        }

        async function startDirectChat(friendId) {
            try {
                const res = await fetch('/api/rooms/direct', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ friendId })
                });
                if (res.ok) {
                    const room = await res.json();
                    await loadRooms();
                    switchRoom(room.id, 'Личный чат', 'direct');
                    closeMenu();
                }
            } catch(e) {
                alert('Ошибка');
            }
        }

        function switchRoom(roomId, roomName) {
            currentRoom = roomId;
            document.getElementById('currentRoomName').textContent = roomName || 'Чат';
            
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'join_room', roomId: roomId }));
            }
            
            document.querySelectorAll('.room-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            
            socket.send(JSON.stringify({
                type: 'message',
                message: message,
                roomId: currentRoom
            }));
            messageInput.value = '';
            stopTyping();
        }

        async function sendFile() {
            const file = fileInput.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}` },
                    body: formData
                });
                if (res.ok) {
                    const data = await res.json();
                    socket.send(JSON.stringify({
                        type: 'file',
                        fileUrl: data.fileUrl,
                        fileType: data.fileType,
                        originalName: data.originalName,
                        roomId: currentRoom
                    }));
                }
            } catch(e) {
                console.error('Upload error:', e);
            }
            fileInput.value = '';
        }

        function addMessageToChat(msg, isOwn, scroll = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    <strong>${isOwn ? 'Вы' : escapeHtml(msg.username)}</strong>
                    <span>${time}</span>
                </div>
                <div class="message-content">${escapeHtml(msg.message)}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            if (scroll) messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addFileToChat(data, isOwn) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            let content = '';
            if (data.fileType === 'image') {
                content = `<img src="${data.fileUrl}" class="message-image" onclick="window.open('${data.fileUrl}')">`;
            } else {
                content = `<a href="${data.fileUrl}" target="_blank">📎 ${escapeHtml(data.originalName)}</a>`;
            }
            messageDiv.innerHTML = `
                <div class="message-header">
                    <strong>${isOwn ? 'Вы' : escapeHtml(data.username)}</strong>
                </div>
                <div class="message-content">${content}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.style.textAlign = 'center';
            sysDiv.style.fontSize = '0.7rem';
            sysDiv.style.color = '#888';
            sysDiv.style.padding = '0.5rem';
            sysDiv.textContent = text;
            messagesDiv.appendChild(sysDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function playNotification() {
            const audio = document.getElementById('notificationSound');
            audio.play().catch(e => console.log('Audio play failed'));
        }

        function startTyping() {
            if (!isTyping && socket && socket.readyState === WebSocket.OPEN) {
                isTyping = true;
                socket.send(JSON.stringify({ type: 'typing', isTyping: true }));
            }
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(stopTyping, 1000);
        }

        function stopTyping() {
            if (isTyping && socket && socket.readyState === WebSocket.OPEN) {
                isTyping = false;
                socket.send(JSON.stringify({ type: 'typing', isTyping: false }));
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Создание группы
        createGroupBtn.onclick = () => {
            if (!friends || friends.length === 0) {
                alert('❌ Нет друзей для создания группы');
                return;
            }
            const modal = document.getElementById('createGroupModal');
            modal.style.display = 'flex';
            document.getElementById('groupName').value = '';
            const friendsSelect = document.getElementById('friendsSelect');
            friendsSelect.innerHTML = '';
            friends.forEach(friend => {
                const label = document.createElement('label');
                label.className = 'friend-checkbox';
                label.innerHTML = `<input type="checkbox" value="${friend.id}"> ${escapeHtml(friend.username)}`;
                friendsSelect.appendChild(label);
            });
        };

        createDirectBtn.onclick = () => {
            const modal = document.getElementById('createDirectModal');
            modal.style.display = 'flex';
            const searchInput = document.getElementById('searchUser');
            searchInput.value = '';
            document.getElementById('searchResults').innerHTML = '';
            
            let searchTimeout;
            searchInput.oninput = async (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                if (query.length < 2) return;
                
                searchTimeout = setTimeout(async () => {
                    try {
                        const res = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`, {
                            headers: { 'Authorization': `Bearer ${currentToken}` }
                        });
                        const users = await res.json();
                        const results = document.getElementById('searchResults');
                        results.innerHTML = '';
                        
                        for (const user of users) {
                            if (user.id === currentUser.id) continue;
                            const isFriend = friends.some(f => f.id === user.id);
                            const div = document.createElement('div');
                            div.className = 'search-result-item';
                            div.innerHTML = `
                                <span>${escapeHtml(user.username)}</span>
                                <button ${isFriend ? 'disabled style="opacity:0.5"' : ''}>
                                    ${isFriend ? '✓ В друзьях' : '➕ Добавить'}
                                </button>
                            `;
                            if (!isFriend) {
                                div.querySelector('button').onclick = async () => {
                                    await addFriend(user.username);
                                    modal.style.display = 'none';
                                };
                            }
                            results.appendChild(div);
                        }
                    } catch(e) {
                        console.error('Search error:', e);
                    }
                }, 500);
            };
        };

        async function addFriend(username) {
            try {
                const res = await fetch('/api/friends/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ friendUsername: username })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(`✅ Запрос отправлен пользователю ${username}`);
                } else {
                    alert(`❌ ${data.error}`);
                }
            } catch(e) {
                alert('❌ Ошибка');
            }
        }

        document.getElementById('createGroupSubmit').onclick = async () => {
            const groupName = document.getElementById('groupName').value.trim();
            const checkboxes = document.querySelectorAll('#friendsSelect input:checked');
            const members = Array.from(checkboxes).map(cb => parseInt(cb.value));
            
            if (!groupName || members.length === 0) {
                alert('Введите название и выберите участников');
                return;
            }
            
            try {
                const res = await fetch('/api/rooms/private', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ name: groupName, members })
                });
                if (res.ok) {
                    await loadRooms();
                    document.getElementById('createGroupModal').style.display = 'none';
                    alert('✅ Группа создана!');
                }
            } catch(e) {
                alert('Ошибка');
            }
        };

        // Закрытие модальных окон
        document.querySelectorAll('.close').forEach(close => {
            close.onclick = () => {
                document.querySelectorAll('.modal').forEach(modal => modal.style.display = 'none');
            };
        });

        window.onclick = (event) => {
            document.querySelectorAll('.modal').forEach(modal => {
                if (event.target === modal) modal.style.display = 'none';
            });
        };

        messageInput.addEventListener('input', startTyping);
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'grid' : 'none';
            if (emojiPicker.children.length === 0) {
                emojis.forEach(emoji => {
                    const span = document.createElement('span');
                    span.textContent = emoji;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        messageInput.value += emoji;
                        emojiPicker.style.display = 'none';
                        messageInput.focus();
                    };
                    emojiPicker.appendChild(span);
                });
            }
        });

        fileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', sendFile);
        
        logoutBtn.addEventListener('click', () => {
            if (socket) socket.close();
            location.reload();
        });

        document.addEventListener('click', (e) => {
            if (emojiBtn && !emojiBtn.contains(e.target) && emojiPicker && !emojiPicker.contains(e.target)) {
                emojiPicker.style.display = 'none';
            }
        });
    </script>
</body>
</html>
